<script type="module">

// Cloudinary
async function cloudinaryUpload(blob, filename) {
  const ts=Math.round(Date.now()/1000), folder='gallery';
  const str=`folder=${folder}&timestamp=${ts}${API_SECRET_CLD}`;
  const buf=await crypto.subtle.digest('SHA-1',new TextEncoder().encode(str));
  const sig=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  const fd=new FormData();
  fd.append('file',blob,filename); fd.append('api_key',API_KEY_CLD);
  fd.append('timestamp',ts); fd.append('folder',folder); fd.append('signature',sig);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:'POST',body:fd});
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||'Upload failed');}
  const d=await res.json(); return {url:d.secure_url,publicId:d.public_id};
}
async function cloudinaryDelete(publicId) {
  const ts=Math.round(Date.now()/1000);
  const str=`public_id=${publicId}&timestamp=${ts}${API_SECRET_CLD}`;
  const buf=await crypto.subtle.digest('SHA-1',new TextEncoder().encode(str));
  const sig=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  const fd=new FormData();
  fd.append('public_id',publicId); fd.append('timestamp',ts); fd.append('api_key',API_KEY_CLD); fd.append('signature',sig);
  await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/destroy`,{method:'POST',body:fd});
}

// 作者/絵師 共通
async function getOrCreate(collName, name) {
  const snap=await getDocs(query(collection(db,collName),where('name','==',name.trim())));
  if(!snap.empty) return snap.docs[0].id;
  const ref=await addDoc(collection(db,collName),{name:name.trim()});
  return ref.id;
}

// 初期化
async function init() {
  await Promise.all([loadArtists(), loadTextAuthors()]);
  await Promise.all([loadItems(), loadTexts()]);
}

// 絵師
async function loadArtists() {
  const snap=await getDocs(query(collection(db,'artists'),orderBy('name')));
  artists=snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function loadTextAuthors() {
  const snap=await getDocs(query(collection(db,'textAuthors'),orderBy('name')));
  textAuthors=snap.docs.map(d=>({id:d.id,...d.data()}));
}

function renderTabs() {
  const tabs=document.getElementById('artistTabs');
  tabs.innerHTML='';
  const list=mode==='image'?artists:textAuthors;
  const all=document.createElement('button');
  all.className='tab'+(currentArtist==='all'?' active':'');
  all.textContent='ALL'; all.onclick=()=>selectArtist('all');
  tabs.appendChild(all);
  list.forEach(a=>{
    const t=document.createElement('button');
    t.className='tab'+(currentArtist===a.id?' active':'');
    t.textContent=a.name; t.onclick=()=>selectArtist(a.id);
    tabs.appendChild(t);
  });
}

function selectArtist(id){currentArtist=id;currentPage=0;renderTabs();renderCurrent();}

// モード切り替え
window.switchMode = function(m) {
  mode=m; currentArtist='all'; currentPage=0;
  document.getElementById('modeImg').classList.toggle('active',m==='image');
  document.getElementById('modeTxt').classList.toggle('active',m==='text');
  document.getElementById('gallery').style.display=m==='image'?'grid':'none';
  document.getElementById('textList').style.display=m==='text'?'flex':'none';
  if(m==='text'){
    document.getElementById('uploadModalTitle') && (document.getElementById('uploadModalTitle').textContent='ZIP アップロード（文章）');
    document.getElementById('authorLabel') && (document.getElementById('authorLabel').textContent='作者名');
    document.getElementById('zipSub') && (document.getElementById('zipSub').textContent='.txt のみ展開');
  } else {
    document.getElementById('uploadModalTitle') && (document.getElementById('uploadModalTitle').textContent='ZIP アップロード');
    document.getElementById('authorLabel') && (document.getElementById('authorLabel').textContent='絵師名');
    document.getElementById('zipSub') && (document.getElementById('zipSub').textContent='jpg / png / gif / webp のみ展開');
  }
  renderTabs(); renderCurrent();
};

function renderCurrent(){mode==='image'?render():renderTexts();}

// 画像
async function loadItems() {
  try {
    const snap=await getDocs(query(collection(db,'artworks'),orderBy('date','desc')));
    items=snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e){console.error(e);items=[];}
}
function getFiltered(){return currentArtist==='all'?items:items.filter(i=>i.artistId===currentArtist);}

function render() {
  const g=document.getElementById('gallery');
  g.style.display='grid';
  document.getElementById('textList').style.display='none';
  const filtered=getFiltered();
  const total=Math.ceil(filtered.length/PAGE_SIZE);
  const pag=document.getElementById('pagination');
  if(total>1){
    pag.style.display='flex';
    document.getElementById('pageInfo').textContent=`${currentPage+1} / ${total}`;
    document.getElementById('prevBtn').disabled=currentPage===0;
    document.getElementById('nextBtn').disabled=currentPage>=total-1;
  } else pag.style.display='none';
  if(!filtered.length){g.innerHTML=`<div class="empty-state">${!items.length?'まだ作品がありません':'この絵師の作品はありません'}</div>`;return;}
  const paged=filtered.slice(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE);
  const amap={}; artists.forEach(a=>amap[a.id]=a.name);
  g.innerHTML=paged.map(item=>`
    <div class="card" onclick="window.__openDetail('${item.id}')">
      <img src="${item.imageUrl}" alt="" loading="lazy">
      <div class="card-overlay">
        <div class="card-date">${item.date||''}</div>
        ${currentArtist==='all'&&amap[item.artistId]?`<div class="card-artist">${amap[item.artistId]}</div>`:''}
      </div>
      ${isAdmin?`<div class="admin-controls"><button class="icon-btn del" onclick="event.stopPropagation();window.__deleteItem('${item.id}')">✕</button></div>`:''}
    </div>`).join('');
}

window.changePage=function(dir){
  const total=Math.ceil((mode==='image'?getFiltered():getFilteredTexts()).length/PAGE_SIZE);
  currentPage=Math.max(0,Math.min(currentPage+dir,total-1));
  renderCurrent(); window.scrollTo({top:0,behavior:'smooth'});
};

window.__openDetail=function(id){
  const item=items.find(i=>i.id===id); if(!item) return;
  currentDetailItem=item;
  const amap={}; artists.forEach(a=>amap[a.id]=a.name);
  document.getElementById('detailImg').src=item.imageUrl;
  document.getElementById('detailArtist').textContent=amap[item.artistId]||'—';
  document.getElementById('detailDate').textContent=item.date||'—';
  document.getElementById('detailDeleteBtn').style.display=isAdmin?'inline-block':'none';
  openModal('detailModal');
};
window.downloadDetail=function(){
  if(!currentDetailItem?.imageUrl) return;
  const a=document.createElement('a'); a.href=currentDetailItem.imageUrl; a.download=currentDetailItem.filename||'image'; a.target='_blank'; a.click();
};
window.deleteFromDetail=async function(){
  if(!currentDetailItem) return;
  await window.__deleteItem(currentDetailItem.id); closeModal('detailModal');
};
window.__deleteItem=async function(id){
  if(!confirm('この作品を削除しますか？')) return;
  const item=items.find(i=>i.id===id); setSaving(true);
  try{if(item?.publicId) await cloudinaryDelete(item.publicId); await deleteDoc(doc(db,'artworks',id)); await loadItems(); render();}
  catch(e){alert('削除に失敗: '+e.message);}finally{setSaving(false);}
};

// テキスト
async function loadTexts() {
  try {
    const snap=await getDocs(query(collection(db,'texts'),orderBy('date','desc')));
    texts=snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e){console.error(e);texts=[];}
}
function getFilteredTexts(){return currentArtist==='all'?texts:texts.filter(t=>t.authorId===currentArtist);}

function renderTexts() {
  document.getElementById('gallery').style.display='none';
  const tl=document.getElementById('textList');
  tl.style.display='flex';
  const filtered=getFilteredTexts();
  const total=Math.ceil(filtered.length/PAGE_SIZE);
  const pag=document.getElementById('pagination');
  if(total>1){
    pag.style.display='flex';
    document.getElementById('pageInfo').textContent=`${currentPage+1} / ${total}`;
    document.getElementById('prevBtn').disabled=currentPage===0;
    document.getElementById('nextBtn').disabled=currentPage>=total-1;
  } else pag.style.display='none';
  if(!filtered.length){tl.innerHTML=`<div class="empty-state">${!texts.length?'まだ文章がありません':'この作者の文章はありません'}</div>`;return;}
  const paged=filtered.slice(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE);
  const amap={}; textAuthors.forEach(a=>amap[a.id]=a.name);
  tl.innerHTML=paged.map(item=>`
    <div class="text-card" onclick="window.__openText('${item.id}')">
      ${isAdmin?`<button class="text-card-admin" onclick="event.stopPropagation();window.__deleteText('${item.id}')">✕</button>`:''}
      <div class="text-card-title">${item.title||item.filename||'無題'}</div>
      <div class="text-card-meta">${amap[item.authorId]||''}${item.date?' · '+item.date:''}</div>
    </div>`).join('');
}

window.__openText=function(id){
  const item=texts.find(t=>t.id===id); if(!item) return;
  currentTextItem=item;
  const amap={}; textAuthors.forEach(a=>amap[a.id]=a.name);
  document.getElementById('textTitle').textContent=item.title||item.filename||'無題';
  document.getElementById('textMetaRow').textContent=(amap[item.authorId]||'')+(item.date?' · '+item.date:'');
  document.getElementById('textContent').textContent=item.content||'';
  document.getElementById('textDeleteBtn').style.display=isAdmin?'inline-block':'none';
  openModal('textModal');
};
window.deleteTextFromModal=async function(){
  if(!currentTextItem) return;
  await window.__deleteText(currentTextItem.id); closeModal('textModal');
};
window.__deleteText=async function(id){
  if(!confirm('この文章を削除しますか？')) return;

  try{await deleteDoc(doc(db,'texts',id)); await loadTexts(); renderTexts();}
  catch(e){alert('削除に失敗: '+e.message);}finally{setSaving(false);}
};

// ファイル名から日付を抽出
function extractDateFromFilename(filename) {
  const nameWithoutExt = filename.replace(/\.txt$/i, '');
  // 日本語: 2025年1月26日 または 2025年01月26日
  const jpMatch = nameWithoutExt.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (jpMatch) {
    const year = jpMatch[1];
    const month = jpMatch[2].padStart(2, '0');
    const day = jpMatch[3].padStart(2, '0');
    return `${year}-${month}-${day}`;
  }
  // 半角: 2025-01-26 または 2025/01/26
  const engMatch = nameWithoutExt.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if (engMatch) {
    const year = engMatch[1];
    const month = engMatch[2].padStart(2, '0');
    const day = engMatch[3].padStart(2, '0');
    return `${year}-${month}-${day}`;
  }
  return null;
}

window.openUploadModal=function(){
  selectedZipFile=null;
  document.getElementById('authorNameInput').value='';

window.handleZipSelect=function(e){
  const f=e.target.files[0]; if(!f) return;
  selectedZipFile=f; document.getElementById('zipLabel').textContent=`✓ ${f.name}`;
};

window.startUpload=async function(){
  const authorName=document.getElementById('authorNameInput').value.trim();
  if(!authorName){alert('名前を入力してください');return;}
  if(!selectedZipFile){alert('ZIPファイルを選択してください');return;}

  document.getElementById('uploadBtn').disabled=true;
  document.getElementById('progressWrap').style.display='block';
  document.getElementById('progressText').textContent='確認中...';

  if(mode==='image'){
    // 画像アップロード (日付はZIP内の更新日時を使う)
    let artistId;
    try{artistId=await getOrCreate('artists',authorName);}
    catch(e){alert('絵師登録失敗: '+e.message);document.getElementById('uploadBtn').disabled=false;return;}
    const EXT_RE=/\.(jpe?g|png|gif|webp)$/i;
    let zip; try{zip=await JSZip.loadAsync(selectedZipFile);}catch(e){alert('ZIP読み込み失敗: '+e.message);document.getElementById('uploadBtn').disabled=false;return;}
    const files=[]; zip.forEach((path,entry)=>{if(entry.dir||path.startsWith('__MACOSX'))return;const name=path.split('/').pop();if(EXT_RE.test(name))files.push({entry,name});});
    if(!files.length){alert('画像ファイルが見つかりませんでした');document.getElementById('uploadBtn').disabled=false;return;}
    let done=0; const total=files.length;
    for(const {entry,name} of files){
      try{
        const dateStr=entry.date ? new Date(entry.date).toISOString().split('T')[0] : '';
        const blob=await entry.async('blob');
        const {url,publicId}=await cloudinaryUpload(blob,name);
        await addDoc(collection(db,'artworks'),{imageUrl:url,publicId,filename:name,date:dateStr,artistId});
        done++; document.getElementById('progressFill').style.width=Math.round(done/total*100)+'%';
        document.getElementById('progressText').textContent=`${done} / ${total} 枚完了`;
      }catch(e){console.error(name,e);}
    }
    document.getElementById('progressText').textContent=`完了！ ${done}枚`;
    await loadArtists(); await loadItems();
  } else {
    // テキストアップロード (ファイル名から日付を抽出)
    let authorId;
    try{authorId=await getOrCreate('textAuthors',authorName);}
    catch(e){alert('作者登録失敗: '+e.message);document.getElementById('uploadBtn').disabled=false;return;}
    let zip; try{zip=await JSZip.loadAsync(selectedZipFile);}catch(e){alert('ZIP読み込み失敗: '+e.message);document.getElementById('uploadBtn').disabled=false;return;}
    const files=[]; zip.forEach((path,entry)=>{if(entry.dir||path.startsWith('__MACOSX'))return;const name=path.split('/').pop();if(/\.txt$/i.test(name))files.push({entry,name});});
    if(!files.length){alert('.txtファイルが見つかりませんでした');document.getElementById('uploadBtn').disabled=false;return;}
    let done=0; const total=files.length;
    for(const {entry,name} of files){
      try{
        // ファイル名から日付を抽出
        let dateStr = extractDateFromFilename(name);
        // 見つからなければZIP内の日時を使う
        if(!dateStr && entry.date) {
          dateStr = new Date(entry.date).toISOString().split('T')[0];
        }
        const content=await entry.async('string');
        const title=name.replace(/\.txt$/i,'').replace(/^[\d\s年月日_:\-\/]+/,'').trim();
        await addDoc(collection(db,'texts'),{title,filename:name,content,date:dateStr,authorId});
        done++; document.getElementById('progressFill').style.width=Math.round(done/total*100)+'%';
        document.getElementById('progressText').textContent=`${done} / ${total} 件完了`;
      }catch(e){console.error(name,e);}
    }
    document.getElementById('progressText').textContent=`完了！ ${done}件`;
    await loadTextAuthors(); await loadTexts();
  }
  renderTabs(); renderCurrent();
  setTimeout(()=>closeModal('uploadModal'),1400);
};
